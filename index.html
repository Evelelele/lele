<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小奇学园 · 智慧学习舱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f8;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========= 欢迎首页 ========= */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ffb347 0%, #ff8c1a 100%);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }
        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 64px;
            padding: 40px 50px;
            text-align: center;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .welcome-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff8c1a;
            margin-bottom: 10px;
        }
        .welcome-sub {
            color: #5a3e1f;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .start-btn {
            background: #ffb347;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #b4621a;
            transition: 0.05s linear;
            font-family: inherit;
        }
        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b4621a;
        }

        /* ========= 主应用（与之前相同，微调） ========= */
        .main-app {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e9ecef;
        }
        .title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .title-area span {
            font-size: 36px;
        }
        .title-area h1 {
            font-size: 1.6rem;
            color: #1e293b;
        }
        .stats {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .coin-box {
            background: #ffb347;
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .coin-amount {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }
        .parent-btn {
            background: #475569;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .parent-btn:active {
            transform: scale(0.96);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .course-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 18px;
            transition: 0.2s;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
        }
        .course-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }
        .course-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .course-icon {
            font-size: 36px;
            background: #fef9e6;
            width: 50px;
            height: 50px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .course-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #0f172a;
            flex: 1;
        }
        .course-actions {
            display: flex;
            gap: 6px;
        }
        .course-actions button {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 20px;
        }
        .progress-dots {
            display: flex;
            gap: 5px;
            margin: 12px 0;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #cbd5e1;
            border-radius: 8px;
        }
        .dot.completed {
            background: #ffb347;
        }
        .course-desc {
            font-size: 0.75rem;
            color: #475569;
            margin: 8px 0;
            line-height: 1.3;
        }
        .delete-course {
            background: #fee2e2;
            border: none;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #b91c1c;
            margin-top: 8px;
        }

        .detail-view {
            background: white;
            border-radius: 24px;
            padding: 20px;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .back-btn {
            background: #e2e8f0;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
        }
        .course-title-edit {
            font-size: 1.5rem;
            font-weight: bold;
            background: none;
            border: none;
            padding: 4px 8px;
            border-radius: 20px;
            font-family: inherit;
            cursor: pointer;
        }
        .course-title-edit:focus {
            outline: none;
            background: #fef9e6;
        }
        .course-desc-edit {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            font-family: inherit;
            resize: vertical;
        }
        .task-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #ffb347;
        }
        .task-info {
            flex: 2;
            min-width: 160px;
        }
        .task-title-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .task-title {
            font-size: 1rem;
            font-weight: 600;
            background: none;
            border: none;
            padding: 2px 6px;
            border-radius: 16px;
            font-family: inherit;
            cursor: pointer;
        }
        .task-title:focus {
            outline: none;
            background: #fff0d4;
        }
        .reward-input {
            width: 65px;
            padding: 4px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            text-align: center;
        }
        .timer {
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 30px;
            font-family: monospace;
            font-weight: 600;
        }
        .task-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        button {
            background: #f1f5f9;
            border: none;
            border-radius: 30px;
            padding: 5px 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.05s linear;
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-start { background: #dcfce7; color: #15803d; }
        .btn-complete { background: #ffedd5; color: #b45309; }
        .btn-reset { background: #f1f5f9; }
        .btn-punish { background: #fee2e2; color: #b91c1c; }
        .btn-delete-task { background: #fee2e2; color: #b91c1c; }
        .add-task-btn {
            background: #ffb347;
            color: white;
            width: 100%;
            margin-top: 16px;
            padding: 10px;
            font-weight: bold;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #ffd966;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 1100;
            animation: fadeUp 0.3s;
            font-size: 0.9rem;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .hidden { display: none; }
        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #64748b;
        }

        @media (max-width: 700px) {
            .main-app { padding: 16px; }
            .task-item { flex-direction: column; align-items: stretch; }
            .welcome-card { padding: 30px 25px; }
            .welcome-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- 欢迎首页 -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-card">
            <div class="welcome-icon">🤖✨</div>
            <div class="welcome-title">小奇学园</div>
            <div class="welcome-sub">智慧学习舱 · 快乐成长</div>
            <button class="start-btn" id="startBtn">🚀 开始冒险</button>
        </div>
    </div>

    <!-- 主应用 -->
    <div class="main-app" id="mainApp">
        <div class="header">
            <div class="title-area">
                <span>🤖</span>
                <h1>小奇学园 · 智慧学习舱</h1>
            </div>
            <div class="stats">
                <div class="coin-box">
                    <span>🪙</span>
                    <span class="coin-amount" id="totalCoins">0</span>
                </div>
                <button class="parent-btn" id="openParentPanel">⚙️ 家长</button>
            </div>
        </div>

        <div id="coursesListView">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="font-size: 1.3rem;">📚 我的学习舱</h2>
                <button id="newCourseBtn" style="background:#ffb347; color:white;">➕ 新建课程</button>
            </div>
            <div id="coursesGrid" class="courses-grid"></div>
        </div>

        <div id="courseDetailView" class="detail-view hidden">
            <div class="detail-header">
                <button class="back-btn" id="backToListBtn">← 返回</button>
                <div style="display: flex; gap: 8px;">
                    <button id="editCourseNameBtn" style="background:#e2e8f0;">✏️ 编辑名称</button>
                    <button id="deleteCourseBtn" style="background:#fee2e2; color:#b91c1c;">🗑️ 删除课程</button>
                </div>
            </div>
            <div>
                <div class="course-title-edit" id="detailCourseName" contenteditable="false">课程名称</div>
                <textarea id="courseDescInput" rows="2" placeholder="课程说明..." class="course-desc-edit"></textarea>
            </div>
            <div class="tasks-area">
                <h3 style="margin-bottom: 12px;">✨ 任务列表</h3>
                <div id="tasksContainer"></div>
                <button id="addTaskInDetailBtn" class="add-task-btn">➕ 添加新任务</button>
            </div>
        </div>
        <footer>✨ 完成任务得金币 · 家长可自定义奖励规则</footer>
    </div>

    <script>
        // ---------- 数据 ----------
        let appData = {
            totalCoins: 100,
            globalReward: 12,
            globalPunish: 6,
            courses: []
        };
        let currentCourseId = null;
        let activeTimers = new Map();
        let currentView = "list";
        const PARENT_PASSWORD = "161231";  // 密码仅在验证时使用，不在界面显示

        function initDefault() {
            appData.courses = [
                { id: "c1", name: "🤖 编程小奇兵", description: "学习机器人编程基础", tasks: [
                    { taskId: "t1_1", title: "📱 完成一次Scratch挑战", rewardCoins: 15, completed: false, elapsedSeconds: 0 },
                    { taskId: "t1_2", title: "🔧 组装机器人模型", rewardCoins: 20, completed: false, elapsedSeconds: 0 }
                ]},
                { id: "c2", name: "🔬 科学实验室", description: "有趣的物理化学小实验", tasks: [
                    { taskId: "t2_1", title: "🧪 做一个小火山爆发", rewardCoins: 18, completed: false, elapsedSeconds: 0 },
                    { taskId: "t2_2", title: "🔭 观察星空笔记", rewardCoins: 12, completed: false, elapsedSeconds: 0 }
                ]},
                { id: "c3", name: "🎮 游戏设计工坊", description: "用代码创造你的小游戏", tasks: [
                    { taskId: "t3_1", title: "🕹️ 设计一个弹球游戏", rewardCoins: 25, completed: false, elapsedSeconds: 0 }
                ]}
            ];
            for (let c of appData.courses)
                for (let t of c.tasks)
                    if (!t.taskId) t.taskId = Math.random().toString(36).substr(2,8);
        }

        function saveData() { localStorage.setItem('robot_school_data', JSON.stringify(appData)); }
        function loadData() {
            const raw = localStorage.getItem('robot_school_data');
            if (raw) {
                try {
                    const saved = JSON.parse(raw);
                    appData.totalCoins = saved.totalCoins ?? 100;
                    appData.globalReward = saved.globalReward ?? 12;
                    appData.globalPunish = saved.globalPunish ?? 6;
                    appData.courses = saved.courses || [];
                    for (let c of appData.courses) {
                        if (!c.tasks) c.tasks = [];
                        for (let t of c.tasks) {
                            if (t.rewardCoins === undefined) t.rewardCoins = appData.globalReward;
                            if (t.completed === undefined) t.completed = false;
                            if (t.elapsedSeconds === undefined) t.elapsedSeconds = 0;
                        }
                    }
                } catch(e) { initDefault(); }
            } else { initDefault(); }
            updateCoinDisplay();
        }

        function updateCoinDisplay() { document.getElementById('totalCoins').innerText = appData.totalCoins; }
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function addCoins(amount, reason) {
            appData.totalCoins += amount;
            if (appData.totalCoins < 0) appData.totalCoins = 0;
            updateCoinDisplay();
            saveData();
            if (amount > 0) showToast(`🎉 +${amount}金币！ ${reason}`);
            else if (amount < 0) showToast(`😢 ${amount}金币... 继续加油！`);
        }

        // ---------- 任务操作 ----------
        function startTimerLogic(courseId, taskObj) {
            if (taskObj.completed) { showToast("已完成的任务不能计时"); return; }
            if (activeTimers.has(taskObj.taskId)) { showToast("计时进行中"); return; }
            const interval = setInterval(() => {
                taskObj.elapsedSeconds++;
                const taskDiv = document.querySelector(`.task-item[data-taskid="${taskObj.taskId}"]`);
                if (taskDiv) {
                    const timeSpan = taskDiv.querySelector('.timer');
                    if (timeSpan) timeSpan.innerText = formatTime(taskObj.elapsedSeconds);
                }
                saveData();
            }, 1000);
            activeTimers.set(taskObj.taskId, interval);
            const taskDiv = document.querySelector(`.task-item[data-taskid="${taskObj.taskId}"]`);
            if (taskDiv) {
                const startBtn = taskDiv.querySelector('.btn-start');
                const completeBtn = taskDiv.querySelector('.btn-complete');
                if(startBtn) startBtn.disabled = true;
                if(completeBtn) completeBtn.disabled = false;
            }
        }

        function completeTaskLogic(courseId, taskObj) {
            if (taskObj.completed) { showToast("任务已经完成啦！"); return; }
            if (activeTimers.has(taskObj.taskId)) clearInterval(activeTimers.get(taskObj.taskId)), activeTimers.delete(taskObj.taskId);
            addCoins(taskObj.rewardCoins, `完成任务：${taskObj.title}`);
            taskObj.completed = true;
            saveData();
            renderCurrentCourseDetail();
        }

        function punishTaskLogic(courseId, taskObj) {
            addCoins(-appData.globalPunish, `小奇提醒：再试试看！`);
            saveData();
            renderCurrentCourseDetail();
        }

        function resetTaskLogic(courseId, taskObj) {
            if (taskObj.completed) {
                appData.totalCoins -= taskObj.rewardCoins;
                if (appData.totalCoins < 0) appData.totalCoins = 0;
                updateCoinDisplay();
                showToast(`重置任务，收回${taskObj.rewardCoins}金币`);
            }
            if (activeTimers.has(taskObj.taskId)) clearInterval(activeTimers.get(taskObj.taskId)), activeTimers.delete(taskObj.taskId);
            taskObj.completed = false;
            taskObj.elapsedSeconds = 0;
            saveData();
            renderCurrentCourseDetail();
        }

        function deleteTaskLogic(courseId, taskId) {
            const course = appData.courses.find(c => c.id === courseId);
            if (!course) return;
            const taskIndex = course.tasks.findIndex(t => t.taskId === taskId);
            if (taskIndex !== -1) {
                if (activeTimers.has(taskId)) clearInterval(activeTimers.get(taskId)), activeTimers.delete(taskId);
                course.tasks.splice(taskIndex, 1);
                saveData();
                renderCurrentCourseDetail();
                showToast("任务已删除");
            }
        }

        function formatTime(sec) { let m = Math.floor(sec/60), s = sec%60; return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }

        // ---------- 课程管理 ----------
        function renderCourseList() {
            const grid = document.getElementById('coursesGrid');
            if (!grid) return;
            if (appData.courses.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">✨ 点击“新建课程”开始 ✨</div>'; return; }
            grid.innerHTML = appData.courses.map(course => {
                const tasks = course.tasks || [];
                const completedCount = tasks.filter(t => t.completed).length;
                const total = tasks.length;
                const dotsHtml = Array.from({ length: total }, (_, i) => `<div class="dot ${i < completedCount ? 'completed' : ''}"></div>`).join('');
                return `
                    <div class="course-card" data-id="${course.id}">
                        <div class="course-header">
                            <div class="course-icon">${course.name.includes('编程')?'🤖':(course.name.includes('科学')?'🔬':'🎮')}</div>
                            <div class="course-name">${escapeHtml(course.name)}</div>
                            <div class="course-actions">
                                <button class="edit-course" data-id="${course.id}">✏️</button>
                            </div>
                        </div>
                        <div class="progress-dots">${dotsHtml}</div>
                        <div class="course-desc">${escapeHtml(course.description.substring(0, 60))}</div>
                        <button class="delete-course" data-id="${course.id}">删除课程</button>
                    </div>
                `;
            }).join('');
            document.querySelectorAll('.course-card').forEach(card => {
                const id = card.getAttribute('data-id');
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-course') || e.target.classList.contains('edit-course')) return;
                    openCourseDetail(id);
                });
                const editBtn = card.querySelector('.edit-course');
                editBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    editCourseName(id);
                });
                const del = card.querySelector('.delete-course');
                del?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteCourseById(id);
                });
            });
        }

        function editCourseName(courseId) {
            const course = appData.courses.find(c => c.id === courseId);
            if (!course) return;
            const newName = prompt("修改课程名称", course.name);
            if (newName && newName.trim()) {
                course.name = newName.trim();
                saveData();
                renderCourseList();
                if (currentCourseId === courseId) renderCurrentCourseDetail();
                showToast(`课程名称已改为“${course.name}”`);
            }
        }

        function deleteCourseById(id) {
            if (confirm("确定删除课程？所有任务也会消失。")) {
                appData.courses = appData.courses.filter(c => c.id !== id);
                saveData();
                if (currentCourseId === id) closeDetailView();
                renderCourseList();
            }
        }

        function editCurrentCourseName() {
            const course = appData.courses.find(c => c.id === currentCourseId);
            if (!course) return;
            const newName = prompt("修改课程名称", course.name);
            if (newName && newName.trim()) {
                course.name = newName.trim();
                saveData();
                renderCurrentCourseDetail();
                renderCourseList();
                showToast(`课程名称已改为“${course.name}”`);
            }
        }

        function deleteCurrentCourse() {
            if (currentCourseId) deleteCourseById(currentCourseId);
        }

        function openCourseDetail(id) {
            currentCourseId = id;
            currentView = "detail";
            document.getElementById('coursesListView').classList.add('hidden');
            document.getElementById('courseDetailView').classList.remove('hidden');
            renderCurrentCourseDetail();
        }

        function closeDetailView() {
            for (let [_, intv] of activeTimers) clearInterval(intv);
            activeTimers.clear();
            currentView = "list";
            document.getElementById('coursesListView').classList.remove('hidden');
            document.getElementById('courseDetailView').classList.add('hidden');
            renderCourseList();
        }

        function renderCurrentCourseDetail() {
            const course = appData.courses.find(c => c.id === currentCourseId);
            if (!course) { closeDetailView(); return; }
            const nameSpan = document.getElementById('detailCourseName');
            nameSpan.innerText = course.name;
            nameSpan.setAttribute('data-course-name', course.name);
            const descInput = document.getElementById('courseDescInput');
            descInput.value = course.description;
            descInput.onblur = () => { course.description = descInput.value; saveData(); };

            const container = document.getElementById('tasksContainer');
            if (!course.tasks.length) {
                container.innerHTML = '<div style="padding:20px;text-align:center;">✨ 还没有任务，点击下方添加新挑战吧 ✨</div>';
                return;
            }
            container.innerHTML = course.tasks.map(task => `
                <div class="task-item" data-taskid="${task.taskId}">
                    <div class="task-info">
                        <div class="task-title-wrapper">
                            <span class="task-title" contenteditable="false">${escapeHtml(task.title)}</span>
                            <button class="edit-title-btn" data-taskid="${task.taskId}">✏️</button>
                        </div>
                        <div style="display:flex; gap:8px; margin-top:6px;">
                            <span>🏅</span>
                            <input type="number" class="reward-input" data-taskid="${task.taskId}" value="${task.rewardCoins}" step="1">
                        </div>
                    </div>
                    <div class="timer">${formatTime(task.elapsedSeconds)}</div>
                    <div class="task-buttons">
                        <button class="btn-start" ${task.completed ? 'disabled' : ''}>▶ 开始</button>
                        <button class="btn-complete" ${task.completed ? 'disabled' : ''}>✅ 完成</button>
                        <button class="btn-reset">🔄 重置</button>
                        <button class="btn-punish">😭 扣金币</button>
                        <button class="btn-delete-task" data-taskid="${task.taskId}">🗑️ 删除</button>
                    </div>
                    ${task.completed ? '<div style="margin-top:8px;">🎖️ 已完成</div>' : ''}
                </div>
            `).join('');

            for (let task of course.tasks) {
                const div = container.querySelector(`.task-item[data-taskid="${task.taskId}"]`);
                if (!div) continue;
                const editBtn = div.querySelector('.edit-title-btn');
                editBtn.onclick = () => {
                    const newTitle = prompt("修改任务名称", task.title);
                    if (newTitle && newTitle.trim()) {
                        task.title = newTitle.trim();
                        saveData();
                        renderCurrentCourseDetail();
                        showToast(`任务名称已更新为“${task.title}”`);
                    }
                };
                const rewardInput = div.querySelector('.reward-input');
                rewardInput?.addEventListener('change', (e) => { let v = parseInt(e.target.value); if (!isNaN(v)) task.rewardCoins = v; saveData(); });
                div.querySelector('.btn-start')?.addEventListener('click', () => startTimerLogic(course.id, task));
                div.querySelector('.btn-complete')?.addEventListener('click', () => completeTaskLogic(course.id, task));
                div.querySelector('.btn-reset')?.addEventListener('click', () => resetTaskLogic(course.id, task));
                div.querySelector('.btn-punish')?.addEventListener('click', () => punishTaskLogic(course.id, task));
                const delBtn = div.querySelector('.btn-delete-task');
                delBtn?.addEventListener('click', () => deleteTaskLogic(course.id, task.taskId));
                if (task.completed) {
                    if(div.querySelector('.btn-start')) div.querySelector('.btn-start').disabled = true;
                    if(div.querySelector('.btn-complete')) div.querySelector('.btn-complete').disabled = true;
                }
            }
        }

        function newCourse() {
            let name = prompt("给新课程起个名字", "新课程");
            if (!name) return;
            let desc = prompt("课程描述", "在这里写下说明～");
            const newId = Date.now() + Math.random().toString(36);
            appData.courses.push({ id: newId, name: name, description: desc || "", tasks: [{ taskId: Math.random().toString(36).substr(2,6), title: "✨ 第一个任务", rewardCoins: appData.globalReward, completed: false, elapsedSeconds: 0 }] });
            saveData();
            renderCourseList();
            showToast(`新课程“${name}”已创建！`);
        }

        function addTaskToCurrentCourse() {
            const course = appData.courses.find(c => c.id === currentCourseId);
            if (!course) return;
            let title = prompt("新任务名称", "新任务");
            if (!title) return;
            let reward = parseInt(prompt(`奖励金币 (默认${appData.globalReward})`, appData.globalReward));
            if (isNaN(reward)) reward = appData.globalReward;
            course.tasks.push({ taskId: Math.random().toString(36).substr(2,8), title: title, rewardCoins: reward, completed: false, elapsedSeconds: 0 });
            saveData();
            renderCurrentCourseDetail();
            showToast(`已添加任务“${title}”`);
        }

        function showParentPanel() {
            const pwd = prompt("请输入家长密码：", "");
            if (pwd !== PARENT_PASSWORD) {
                if (pwd !== null) showToast("密码错误！");
                return;
            }
            const modal = document.createElement('div');
            modal.style.position = 'fixed'; modal.style.top = '0'; modal.style.left = '0';
            modal.style.width = '100%'; modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.5)';
            modal.style.display = 'flex'; modal.style.alignItems = 'center'; modal.style.justifyContent = 'center';
            modal.style.zIndex = '3000';
            modal.innerHTML = `
                <div style="background:white; border-radius: 32px; padding: 24px; width: 280px; text-align: center;">
                    <h3>家长控制台</h3>
                    <label style="display:block; margin:12px 0 5px;">✨ 默认奖励金币</label>
                    <input type="number" id="pReward" value="${appData.globalReward}" style="width:100%; padding:8px; border-radius:20px; border:1px solid #ccc;">
                    <label style="display:block; margin:12px 0 5px;">😢 默认扣除金币</label>
                    <input type="number" id="pPunish" value="${appData.globalPunish}" style="width:100%; padding:8px; border-radius:20px; border:1px solid #ccc;">
                    <button id="saveParentBtn" style="margin-top:16px; background:#ffb347; padding:8px 16px; border-radius:30px;">保存</button>
                    <button id="closeParentBtn" style="margin-top:8px;">关闭</button>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('saveParentBtn').onclick = () => {
                let r = parseInt(document.getElementById('pReward').value);
                let p = parseInt(document.getElementById('pPunish').value);
                if (!isNaN(r)) appData.globalReward = r;
                if (!isNaN(p)) appData.globalPunish = p;
                saveData();
                showToast("设置已保存");
                modal.remove();
            };
            document.getElementById('closeParentBtn').onclick = () => modal.remove();
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

        // 欢迎页切换到主应用
        const welcomeScreen = document.getElementById('welcomeScreen');
        const mainApp = document.getElementById('mainApp');
        const startBtn = document.getElementById('startBtn');
        startBtn.addEventListener('click', () => {
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                mainApp.style.display = 'block';
                showToast("欢迎来到小奇学园！");
            }, 500);
        });

        // 事件绑定
        document.getElementById('newCourseBtn')?.addEventListener('click', newCourse);
        document.getElementById('backToListBtn')?.addEventListener('click', closeDetailView);
        document.getElementById('addTaskInDetailBtn')?.addEventListener('click', addTaskToCurrentCourse);
        document.getElementById('openParentPanel')?.addEventListener('click', showParentPanel);
        document.getElementById('editCourseNameBtn')?.addEventListener('click', editCurrentCourseName);
        document.getElementById('deleteCourseBtn')?.addEventListener('click', deleteCurrentCourse);

        loadData();
        renderCourseList();
    </script>
</body>
</html>
